[project]
site_name = "pyclickhouse"
site_description = "Python async ClickHouse ORM using Pydantic"
site_author = "Ashwath Nadahalli <anadahalli@gmail.com>"
# site_url = ""
copyright = "Copyright &copy; 2026 The authors"

nav = [
  { "Overview" = "index.md" },
  { "Concepts" = [
      # "concepts/index.md",
      "concepts/client.md",
      "concepts/admin.md",
      "concepts/reader.md",
      "concepts/writer.md",
      "concepts/query.md",
      "concepts/table.md",
      "concepts/view.md",
      "concepts/engine.md",
      "concepts/registry.md",
  ]},
  { "References" = [
      # "references/index.md",
      "references/settings.md",
      "references/client.md",
      "references/admin.md",
      "references/reader.md",
      "references/writer.md",
      "references/table.md",
      "references/view.md",
      "references/query.md",
      "references/engines.md",
      "references/fields.md",
      "references/functions.md",
  ]},
]

#extra_css = ["stylesheets/extra.css"]
#extra_javascript = ["javascripts/extra.js"]

[project.theme]
#variant = "classic"
#custom_dir = "overrides"
#favicon = "images/favicon.png"
language = "en"

features = [
    "announce.dismiss",
    #"content.action.edit",
    #"content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    # "header.autohide",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    #"navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    # "toc.follow",
    # "toc.integrate",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

#[project.theme.icon]
#logo = "lucide/smile"
#repo = "lucide/smile"

#[[project.extra.social]]
#icon = "fontawesome/brands/github"
#link = "https://github.com/user/repo"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src/pyclickhouse"]

[project.plugins.mkdocstrings.handlers.python.options]
filters = ["!^_"]
docstring_style = "google"
docstring_section_style = "table"
show_if_no_docstring = false
inherited_members = false
show_source = false
show_root_heading = true
show_root_full_path = true
show_symbol_type_heading = true
show_symbol_type_toc = true
type_parameter_headings = true
merge_init_into_class = true
# members = false
